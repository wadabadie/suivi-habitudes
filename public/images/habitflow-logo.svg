<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a7a4a"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
  </defs>
  <!-- Icône : cercle + arc de progression + point de complétion -->
  <circle cx="20" cy="20" r="13" fill="none" stroke="url(#lg)" stroke-width="2.5"/>
  <!-- Arc intérieur (progression ~75%) -->
  <path d="M20 9 A11 11 0 1 1 9.5 28.5" fill="none" stroke="url(#lg)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Check mark -->
  <path d="M13 20 L18 25 L27 15" fill="none" stroke="url(#lg)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Texte : HabitFlow -->
  <text x="40" y="16" font-family="'Playfair Display', Georgia, serif" font-size="13" font-weight="700" fill="#e6edf3" letter-spacing="0.3">Habit</text>
  <text x="40" y="32" font-family="'DM Sans', system-ui, sans-serif" font-size="11" font-weight="500" fill="#2ecc71" letter-spacing="2">FLOW</text>
</svg>
